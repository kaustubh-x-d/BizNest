version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: biznest_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: biznest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biznest_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=biznest
      - POSTGRES_PORT=5432
      - SECRET_KEY=supersecretjwtkeyforlocaldevelopment123!
      - REFRESH_SECRET_KEY=supersecretjwtrefreshkeyforlocaldevelopment123!
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biznest_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
